<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Fundamental Analysis Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(30, 41, 59, 0.5);
            border-radius: 15px;
            border: 1px solid rgba(148, 163, 184, 0.1);
        }

        .header h1 {
            font-size: 2.5em;
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .header p {
            color: #94a3b8;
            font-size: 1.1em;
        }

        .timestamp {
            text-align: center;
            color: #64748b;
            margin-bottom: 20px;
            font-size: 0.9em;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.3);
        }

        .btn-secondary {
            background: rgba(148, 163, 184, 0.1);
            color: #e2e8f0;
            border: 1px solid rgba(148, 163, 184, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(148, 163, 184, 0.2);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .market-selector {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .market-chip {
            padding: 8px 16px;
            border-radius: 20px;
            border: 2px solid rgba(148, 163, 184, 0.2);
            background: rgba(30, 41, 59, 0.5);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9em;
        }

        .market-chip.active {
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.2);
            color: #3b82f6;
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.2em;
            color: #94a3b8;
        }

        .spinner {
            border: 3px solid rgba(148, 163, 184, 0.1);
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: rgba(30, 41, 59, 0.5);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(148, 163, 184, 0.1);
            transition: all 0.3s ease;
        }

        .card:hover {
            border-color: rgba(59, 130, 246, 0.3);
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.1);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .card-title {
            font-size: 1.3em;
            font-weight: 600;
            color: #f1f5f9;
        }

        .sentiment-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .bullish {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        .bearish {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .neutral {
            background: rgba(234, 179, 8, 0.2);
            color: #eab308;
            border: 1px solid rgba(234, 179, 8, 0.3);
        }

        .metric {
            margin: 10px 0;
        }

        .metric-label {
            color: #94a3b8;
            font-size: 0.9em;
            margin-bottom: 5px;
        }

        .metric-value {
            font-size: 1.5em;
            font-weight: 700;
            color: #f1f5f9;
        }

        .briefing-section {
            background: rgba(30, 41, 59, 0.5);
            border-radius: 15px;
            padding: 30px;
            border: 1px solid rgba(148, 163, 184, 0.1);
            margin-bottom: 30px;
        }

        .briefing-title {
            font-size: 1.8em;
            font-weight: 700;
            margin-bottom: 20px;
            color: #f1f5f9;
        }

        .briefing-content {
            line-height: 1.8;
            color: #cbd5e1;
        }

        .briefing-content h3 {
            color: #3b82f6;
            margin-top: 20px;
            margin-bottom: 10px;
        }

        .briefing-content ul {
            margin-left: 20px;
            margin-bottom: 15px;
        }

        .briefing-content li {
            margin-bottom: 8px;
        }

        .alert-box {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 10px;
            padding: 15px;
            margin: 10px 0;
        }

        .alert-box.positive {
            background: rgba(34, 197, 94, 0.1);
            border-color: rgba(34, 197, 94, 0.3);
        }

        .alert-box.warning {
            background: rgba(234, 179, 8, 0.1);
            border-color: rgba(234, 179, 8, 0.3);
        }

        .news-item {
            background: rgba(15, 23, 42, 0.5);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 3px solid #3b82f6;
        }

        .news-title {
            font-weight: 600;
            margin-bottom: 5px;
            color: #f1f5f9;
        }

        .news-source {
            color: #64748b;
            font-size: 0.85em;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(148, 163, 184, 0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 10px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #3b82f6 0%, #8b5cf6 100%);
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .stat-box {
            background: rgba(15, 23, 42, 0.5);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-number {
            font-size: 2em;
            font-weight: 700;
            color: #3b82f6;
        }

        .stat-label {
            color: #94a3b8;
            font-size: 0.9em;
            margin-top: 5px;
        }

        @media (max-width: 768px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
            
            .controls {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 Fundamental Analysis Dashboard</h1>
            <p>AI-Powered Macro Analysis & Sentiment Tracking for Day Trading</p>
        </div>

        <div class="timestamp" id="timestamp"></div>

        <div class="controls">
            <button class="btn btn-primary" id="generateBriefing" onclick="generateMorningBriefing()">
                📊 Generate Morning Briefing
            </button>
            <button class="btn btn-primary" id="analyzeSentiment" onclick="analyzeLiveSentiment()">
                📈 Analyze Live Sentiment
            </button>
            <button class="btn btn-secondary" onclick="exportReport()">
                📥 Export Report
            </button>
        </div>

        <div class="market-selector">
            <div class="market-chip active" data-market="stocks" onclick="toggleMarket(this)">📈 Stocks</div>
            <div class="market-chip active" data-market="forex" onclick="toggleMarket(this)">💱 Forex</div>
            <div class="market-chip active" data-market="crypto" onclick="toggleMarket(this)">₿ Crypto</div>
            <div class="market-chip active" data-market="commodities" onclick="toggleMarket(this)">🛢️ Commodities</div>
        </div>

        <div id="loadingIndicator" class="loading" style="display: none;">
            <div class="spinner"></div>
            <div>Analyzing market data with AI...</div>
        </div>

        <div id="briefingSection" style="display: none;">
            <div class="briefing-section">
                <div class="briefing-title">📋 Morning Market Briefing</div>
                <div class="briefing-content" id="briefingContent"></div>
            </div>
        </div>

        <div id="dashboardSection" class="dashboard"></div>
    </div>

    <script>
        let selectedMarkets = ['stocks', 'forex', 'crypto', 'commodities'];
        let analysisData = null;

        function updateTimestamp() {
            const now = new Date();
            document.getElementById('timestamp').textContent = 
                `Last Updated: ${now.toLocaleString('en-US', { 
                    weekday: 'long', 
                    year: 'numeric', 
                    month: 'long', 
                    day: 'numeric', 
                    hour: '2-digit', 
                    minute: '2-digit' 
                })}`;
        }

        function toggleMarket(element) {
            const market = element.dataset.market;
            element.classList.toggle('active');
            
            if (selectedMarkets.includes(market)) {
                selectedMarkets = selectedMarkets.filter(m => m !== market);
            } else {
                selectedMarkets.push(market);
            }
        }

        function showLoading(show) {
            document.getElementById('loadingIndicator').style.display = show ? 'block' : 'none';
            document.getElementById('generateBriefing').disabled = show;
            document.getElementById('analyzeSentiment').disabled = show;
        }

        async function generateMorningBriefing() {
            if (selectedMarkets.length === 0) {
                alert('Please select at least one market to analyze');
                return;
            }

            showLoading(true);
            updateTimestamp();

            const prompt = `You are an expert day trader's analyst. Generate a comprehensive morning briefing for ${new Date().toLocaleDateString()} covering these markets: ${selectedMarkets.join(', ')}.

Please provide:

1. **MACRO MARKET BIAS** - Overall bullish/bearish/neutral sentiment for each market with confidence level
2. **KEY DRIVERS TODAY** - Top 3-5 fundamental factors affecting each market (economic data, geopolitical events, central bank actions, etc.)
3. **TRADING OPPORTUNITIES** - Specific sectors/assets to watch with directional bias
4. **RISK FACTORS** - What could invalidate the bias or cause volatility
5. **ECONOMIC CALENDAR HIGHLIGHTS** - Important releases today and their potential impact

Format your response with clear sections and actionable insights. Be specific about direction and reasoning.`;

            try {
                const response = await fetch("https://api.anthropic.com/v1/messages", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({
                        model: "claude-sonnet-4-20250514",
                        max_tokens: 4000,
                        messages: [
                            { role: "user", content: prompt }
                        ],
                        tools: [
                            {
                                type: "web_search_20250305",
                                name: "web_search"
                            }
                        ]
                    })
                });

                const data = await response.json();
                
                // Extract text content from response
                let briefingText = '';
                if (data.content && Array.isArray(data.content)) {
                    briefingText = data.content
                        .filter(item => item.type === "text")
                        .map(item => item.text)
                        .join('\n\n');
                }

                displayBriefing(briefingText);
                
            } catch (error) {
                console.error('Error generating briefing:', error);
                alert('Failed to generate briefing. Please try again.');
            } finally {
                showLoading(false);
            }
        }

        async function analyzeLiveSentiment() {
            if (selectedMarkets.length === 0) {
                alert('Please select at least one market to analyze');
                return;
            }

            showLoading(true);
            updateTimestamp();

            const prompt = `You are providing LIVE sentiment analysis for day trading. Analyze current market sentiment for: ${selectedMarkets.join(', ')}.

For EACH market, provide:

1. **CURRENT SENTIMENT**: Bullish/Bearish/Neutral with percentage confidence (e.g., "65% Bullish")
2. **SENTIMENT DRIVERS**: What's driving the current sentiment (news, price action, volume, social media)
3. **MOMENTUM**: Is sentiment strengthening or weakening?
4. **KEY LEVELS**: Critical price levels or events to watch
5. **SHORT-TERM BIAS** (next 4-8 hours): Directional bias for intraday trading

Return your analysis in JSON format:
{
  "stocks": {
    "sentiment": "bullish|bearish|neutral",
    "confidence": 75,
    "drivers": ["driver1", "driver2"],
    "momentum": "strengthening|weakening|stable",
    "bias": "Description of short-term bias",
    "keyLevels": ["level1", "level2"]
  },
  "forex": {...},
  "crypto": {...},
  "commodities": {...}
}

Only include markets that were requested: ${selectedMarkets.join(', ')}`;

            try {
                const response = await fetch("https://api.anthropic.com/v1/messages", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({
                        model: "claude-sonnet-4-20250514",
                        max_tokens: 3000,
                        messages: [
                            { role: "user", content: prompt }
                        ],
                        tools: [
                            {
                                type: "web_search_20250305",
                                name: "web_search"
                            }
                        ]
                    })
                });

                const data = await response.json();
                
                // Extract text content
                let responseText = '';
                if (data.content && Array.isArray(data.content)) {
                    responseText = data.content
                        .filter(item => item.type === "text")
                        .map(item => item.text)
                        .join('\n\n');
                }

                // Try to parse JSON from response
                let analysisJson = null;
                const jsonMatch = responseText.match(/\{[\s\S]*\}/);
                if (jsonMatch) {
                    try {
                        analysisJson = JSON.parse(jsonMatch[0]);
                    } catch (e) {
                        console.error('Failed to parse JSON:', e);
                    }
                }

                if (analysisJson) {
                    displayDashboard(analysisJson);
                } else {
                    // Fallback: display as text if JSON parsing fails
                    displayBriefing(responseText);
                }
                
            } catch (error) {
                console.error('Error analyzing sentiment:', error);
                alert('Failed to analyze sentiment. Please try again.');
            } finally {
                showLoading(false);
            }
        }

        function displayBriefing(text) {
            const briefingSection = document.getElementById('briefingSection');
            const briefingContent = document.getElementById('briefingContent');
            
            // Convert markdown-style formatting to HTML
            let html = text
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n## (.+?)\n/g, '<h3>$1</h3>')
                .replace(/\n- (.+?)(?=\n|$)/g, '<li>$1</li>')
                .replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>')
                .replace(/\n/g, '<br>');
            
            briefingContent.innerHTML = html;
            briefingSection.style.display = 'block';
            document.getElementById('dashboardSection').innerHTML = '';
        }

        function displayDashboard(data) {
            const dashboard = document.getElementById('dashboardSection');
            dashboard.innerHTML = '';
            
            document.getElementById('briefingSection').style.display = 'none';

            const marketIcons = {
                stocks: '📈',
                forex: '💱',
                crypto: '₿',
                commodities: '🛢️'
            };

            const marketNames = {
                stocks: 'Stocks/Equities',
                forex: 'Forex',
                crypto: 'Cryptocurrency',
                commodities: 'Commodities'
            };

            selectedMarkets.forEach(market => {
                if (data[market]) {
                    const marketData = data[market];
                    const card = document.createElement('div');
                    card.className = 'card';
                    
                    const sentimentClass = marketData.sentiment.toLowerCase();
                    const sentimentBadge = `<span class="sentiment-badge ${sentimentClass}">${marketData.sentiment.toUpperCase()}</span>`;
                    
                    card.innerHTML = `
                        <div class="card-header">
                            <div class="card-title">${marketIcons[market]} ${marketNames[market]}</div>
                            ${sentimentBadge}
                        </div>
                        
                        <div class="metric">
                            <div class="metric-label">Confidence Level</div>
                            <div class="metric-value">${marketData.confidence}%</div>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${marketData.confidence}%"></div>
                            </div>
                        </div>

                        <div class="metric">
                            <div class="metric-label">Momentum</div>
                            <div class="metric-value" style="font-size: 1.2em;">${marketData.momentum}</div>
                        </div>

                        <div class="metric">
                            <div class="metric-label">Key Drivers</div>
                            ${marketData.drivers.map(d => `<div class="news-item"><div class="news-title">${d}</div></div>`).join('')}
                        </div>

                        <div class="alert-box ${sentimentClass === 'bullish' ? 'positive' : sentimentClass === 'bearish' ? '' : 'warning'}">
                            <strong>Short-term Bias:</strong><br>${marketData.bias}
                        </div>

                        ${marketData.keyLevels && marketData.keyLevels.length > 0 ? `
                            <div class="metric">
                                <div class="metric-label">Key Levels to Watch</div>
                                ${marketData.keyLevels.map(level => `<div style="color: #3b82f6; font-weight: 600; margin: 5px 0;">• ${level}</div>`).join('')}
                            </div>
                        ` : ''}
                    `;
                    
                    dashboard.appendChild(card);
                }
            });
        }

        function exportReport() {
            const briefingContent = document.getElementById('briefingContent').innerText;
            const dashboardContent = document.getElementById('dashboardSection').innerText;
            
            const report = `
TRADING FUNDAMENTAL ANALYSIS REPORT
Generated: ${new Date().toLocaleString()}
Markets: ${selectedMarkets.join(', ')}

${briefingContent || dashboardContent || 'No analysis generated yet'}
            `.trim();

            const blob = new Blob([report], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `trading-analysis-${Date.now()}.txt`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // Initialize timestamp
        updateTimestamp();
        setInterval(updateTimestamp, 60000); // Update every minute
    </script>
</body>
</html>
